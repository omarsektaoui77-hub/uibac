<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 AI SOC Command Center v2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2em;
        }

        h2 {
            margin: 20px 0 10px;
            font-size: 1.5em;
            color: #4ade80;
        }

        .section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .alert {
            background: #450a0a;
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .status-item {
            background: #262626;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #404040;
        }

        .status-label {
            font-size: 0.9em;
            color: #a3a3a3;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .risk-critical { color: #ef4444; }
        .risk-high { color: #f97316; }
        .risk-medium { color: #eab308; }
        .risk-low { color: #22c55e; }

        .log-container {
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .chart-container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
        }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4;
        }

        .heatmap-cell {
            height: 20;
            border-radius: 2px;
        }

        .alert-item {
            background: #450a0a;
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .decision-item {
            background: #262626;
            border: 1px solid #404040;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-kill {
            background: #ef4444;
            color: white;
        }

        .btn-kill:hover {
            background: #dc2626;
        }

        .btn-enable {
            background: #22c55e;
            color: white;
        }

        .btn-enable:hover {
            background: #16a34a;
        }

        .btn-disabled {
            background: #404040;
            color: #a3a3a3;
            cursor: not-allowed;
        }

        .autonomy-status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .autonomy-enabled {
            background: #166534;
            color: #4ade80;
        }

        .autonomy-disabled {
            background: #7f1d1d;
            color: #f87171;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginScreen" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
            <div class="section" style="max-width: 400px; width: 100%;">
                <h1 style="text-align: center;">🔐 AI SOC Login</h1>
                <div style="margin-top: 20px;">
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; color: #a3a3a3;">Username</label>
                        <input type="text" id="username" placeholder="admin" 
                            style="width: 100%; padding: 10px; background: #262626; border: 1px solid #404040; border-radius: 6px; color: #e0e0e0;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; color: #a3a3a3;">Password</label>
                        <input type="password" id="password" placeholder="admin"
                            style="width: 100%; padding: 10px; background: #262626; border: 1px solid #404040; border-radius: 6px; color: #e0e0e0;">
                    </div>
                    <button class="btn-enable" onclick="login()" style="width: 100%;">Login</button>
                    <p id="loginError" style="color: #ef4444; margin-top: 10px; display: none;"></p>
                    <p style="color: #a3a3a3; margin-top: 20px; font-size: 0.85em;">
                        Default users: admin/admin, analyst/analyst, viewer/viewer
                    </p>
                </div>
            </div>
        </div>

        <div id="dashboard" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>🧠 AI SOC Command Center v3</h1>
                <button onclick="logout()" style="padding: 8px 16px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer;">Logout</button>
            </div>

            <div id="alert" class="alert" style="display: none;">
                🚨 High activity detected
            </div>

        <div class="section">
            <h2>📊 System Status <span id="autonomyStatus" class="autonomy-status autonomy-enabled">Autonomy: ENABLED</span></h2>
            <div class="status-grid">
                <div class="status-item">
                    <div class="status-label">Total Events</div>
                    <div class="status-value" id="eventsCount">0</div>
                </div>
                <div class="status-item">
                    <div class="status-label">Decisions Made</div>
                    <div class="status-value" id="decisionsCount">0</div>
                </div>
                <div class="status-item">
                    <div class="status-label">Global Risk</div>
                    <div class="status-value" id="globalRisk">0</div>
                </div>
                <div class="status-item">
                    <div class="status-label">Risk Level</div>
                    <div class="status-value" id="riskLevel">LOW</div>
                </div>
            </div>
            
            <div class="controls">
                <button id="killBtn" class="btn-kill" onclick="killAutonomy()">🛑 Kill Autonomy</button>
                <button id="enableBtn" class="btn-enable btn-disabled" onclick="enableAutonomy()">✅ Enable Autonomy</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="chart-container">
                <h3>� Risk Trend</h3>
                <canvas id="riskChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>🚨 Alerts</h3>
                <div id="alertsPanel"></div>
            </div>
        </div>

        <div class="section" style="margin-top: 20px;">
            <h3>🔥 Risk Heatmap</h3>
            <div class="heatmap-grid" id="heatmap"></div>
        </div>

        <div class="section" style="margin-top: 20px;">
            <h3>🧠 Agent Decisions</h3>
            <div id="decisionsPanel"></div>
        </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:3000";
        let riskChart = null;
        let authToken = null;
        let userRole = null;

        // Check for existing token on load
        function checkAuth() {
            authToken = localStorage.getItem('token');
            userRole = localStorage.getItem('role');
            
            if (authToken) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                update();
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            try {
                const res = await fetch(`${API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    authToken = data.token;
                    userRole = data.role;
                    localStorage.setItem('token', authToken);
                    localStorage.setItem('role', userRole);
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    errorEl.style.display = 'none';
                    
                    update();
                } else {
                    errorEl.textContent = data.error || 'Login failed';
                    errorEl.style.display = 'block';
                }
            } catch (e) {
                errorEl.textContent = 'Connection error';
                errorEl.style.display = 'block';
            }
        }

        function logout() {
            authToken = null;
            userRole = null;
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        function getAuthHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': authToken
            };
        }

        // Risk scoring logic
        function computeGlobalRisk(events = []) {
            if (!events.length) return 0;
            const total = events.reduce((acc, e) => acc + (e.risk || 0), 0);
            return Math.min(100, Math.round(total / events.length * 10));
        }

        function riskLevel(score) {
            if (score > 80) return "CRITICAL";
            if (score > 60) return "HIGH";
            if (score > 30) return "MEDIUM";
            return "LOW";
        }

        function riskClass(level) {
            switch (level) {
                case "CRITICAL": return "risk-critical";
                case "HIGH": return "risk-high";
                case "MEDIUM": return "risk-medium";
                default: return "risk-low";
            }
        }

        async function fetchStatus() {
            const res = await fetch(`${API}/status`, { headers: getAuthHeaders() });
            if (res.status === 401 || res.status === 403) {
                logout();
                return null;
            }
            return res.json();
        }

        async function fetchEvents() {
            const res = await fetch(`${API}/events`, { headers: getAuthHeaders() });
            if (res.status === 401 || res.status === 403) {
                logout();
                return [];
            }
            return res.json();
        }

        async function fetchDecisions() {
            const res = await fetch(`${API}/decisions`, { headers: getAuthHeaders() });
            if (res.status === 401 || res.status === 403) {
                logout();
                return [];
            }
            return res.json();
        }

        async function killAutonomy() {
            await fetch(`${API}/control/kill`, { method: "POST", headers: getAuthHeaders() });
            updateStatus();
        }

        async function enableAutonomy() {
            await fetch(`${API}/control/enable`, { method: "POST", headers: getAuthHeaders() });
            updateStatus();
        }

        async function updateStatus() {
            const status = await fetchStatus();
            document.getElementById('eventsCount').textContent = status.eventsCount;
            
            const autonomyStatus = document.getElementById('autonomyStatus');
            const killBtn = document.getElementById('killBtn');
            const enableBtn = document.getElementById('enableBtn');
            
            if (status.autonomyEnabled) {
                autonomyStatus.textContent = "Autonomy: ENABLED";
                autonomyStatus.className = "autonomy-status autonomy-enabled";
                killBtn.classList.remove('btn-disabled');
                enableBtn.classList.add('btn-disabled');
            } else {
                autonomyStatus.textContent = "Autonomy: DISABLED";
                autonomyStatus.className = "autonomy-status autonomy-disabled";
                killBtn.classList.add('btn-disabled');
                enableBtn.classList.remove('btn-disabled');
            }

            // Alert for high activity
            const alert = document.getElementById('alert');
            if (status.eventsCount > 10) {
                alert.style.display = 'block';
            } else {
                alert.style.display = 'none';
            }
        }

        async function updateRiskChart(events) {
            const data = events.map((e, i) => ({
                index: i,
                risk: e.risk || 0
            }));

            const ctx = document.getElementById('riskChart').getContext('2d');
            
            if (riskChart) {
                riskChart.destroy();
            }

            riskChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.index),
                    datasets: [{
                        label: 'Risk',
                        data: data.map(d => d.risk),
                        borderColor: '#4ade80',
                        backgroundColor: 'rgba(74, 222, 128, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 10,
                            grid: {
                                color: '#333'
                            },
                            ticks: {
                                color: '#a3a3a3'
                            }
                        },
                        x: {
                            grid: {
                                color: '#333'
                            },
                            ticks: {
                                color: '#a3a3a3'
                            }
                        }
                    }
                }
            });
        }

        async function updateHeatmap(events) {
            const heatmap = document.getElementById('heatmap');
            heatmap.innerHTML = events.slice(-100).map(e => {
                const intensity = Math.min(255, (e.risk || 0) * 25);
                return `<div class="heatmap-cell" style="background: rgb(${intensity}, 0, 0)"></div>`;
            }).join('');
        }

        async function updateAlerts(events) {
            const alertsPanel = document.getElementById('alertsPanel');
            const critical = events.filter(e => (e.risk || 0) > 7);
            
            if (critical.length === 0) {
                alertsPanel.innerHTML = '<p style="color: #a3a3a3;">No critical alerts</p>';
            } else {
                alertsPanel.innerHTML = critical.map(e => `
                    <div class="alert-item">
                        ⚠️ ${e.type || 'Unknown'} (risk: ${e.risk})
                    </div>
                `).join('');
            }
        }

        async function updateDecisions(decisions) {
            const decisionsPanel = document.getElementById('decisionsPanel');
            document.getElementById('decisionsCount').textContent = decisions.length;
            
            if (decisions.length === 0) {
                decisionsPanel.innerHTML = '<p style="color: #a3a3a3;">No decisions yet</p>';
            } else {
                decisionsPanel.innerHTML = decisions.slice(-5).map(d => `
                    <div class="decision-item">
                        <strong>Score:</strong> ${d.multi?.score || 'N/A'}
                        <br>
                        <strong>Actions:</strong> ${d.multi?.actions?.join(', ') || 'None'}
                        <br>
                        <strong>Time:</strong> ${new Date(d.time).toLocaleTimeString()}
                    </div>
                `).join('');
            }
        }

        async function updateGlobalRisk(events) {
            const risk = computeGlobalRisk(events);
            const level = riskLevel(risk);
            const riskElement = document.getElementById('globalRisk');
            const levelElement = document.getElementById('riskLevel');
            
            riskElement.textContent = risk;
            riskElement.className = 'status-value ' + riskClass(level);
            
            levelElement.textContent = level;
            levelElement.className = 'status-value ' + riskClass(level);
        }

        // Poll every 2 seconds
        async function update() {
            await updateStatus();
            
            const events = await fetchEvents();
            const decisions = await fetchDecisions();
            
            await updateGlobalRisk(events);
            await updateRiskChart(events);
            await updateHeatmap(events);
            await updateAlerts(events);
            await updateDecisions(decisions);
        }

        // Initialize auth check on load
        checkAuth();

        // Only start polling if authenticated
        if (authToken) {
            update();
            setInterval(update, 2000);
        }
    </script>
</body>
</html>
