name: ZeroLeak Secret Scan

on:
  push:
    branches: [ main, feat/** ]
  pull_request:
    branches: [ main ]

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Run ZeroLeak Scanner
        run: node security/scan-secrets.js --silent
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      
      - name: Upload scan logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: security-log
          path: git-repair.log
          retention-days: 30
      
      - name: Comment on PR with results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚨 **SECRET LEAK DETECTED**\n\nThe ZeroLeak Security Scanner detected secrets in this pull request.\n\nPlease review the scan results and remove any exposed credentials before merging.\n\n👉 Run `node security/scan-secrets.js` locally to identify the secrets.'
            })
