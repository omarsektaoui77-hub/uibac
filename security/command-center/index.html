<!DOCTYPE html>
<html>
<head>
  <title>Security Command Center</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0b0f14; 
      color: #e6edf3; 
      margin: 0;
      padding: 20px;
    }
    h2 { margin-top: 0; }
    .card { 
      padding: 12px; 
      margin: 10px 0; 
      border-radius: 8px; 
      background: #161b22; 
      border-left: 4px solid #333;
    }
    .HIGH { border-left-color: #e74c3c; }
    .CRITICAL { border-left-color: #e67e22; }
    .MEDIUM { border-left-color: #f39c12; }
    .LOW { border-left-color: #27ae60; }
    .stats { 
      display: flex; 
      gap: 20px; 
      margin-bottom: 20px; 
    }
    .stat-card {
      flex: 1;
      padding: 15px;
      background: #161b22;
      border-radius: 8px;
      text-align: center;
    }
    .stat-value { 
      font-size: 24px; 
      font-weight: bold; 
    }
    .stat-label { 
      color: #8b949e; 
      font-size: 12px; 
    }
    .timestamp {
      color: #8b949e;
      font-size: 12px;
    }
    .event-type {
      color: #58a6ff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>🛡️ Security Command Center</h2>
  <div class="stats" id="stats"></div>
  <div id="events"></div>

<script>
async function load() {
  try {
    const stats = await fetch("/stats").then(r=>r.json());
    document.getElementById("stats").innerHTML =
      `<div class="stat-card">
        <div class="stat-value">${stats.total}</div>
        <div class="stat-label">Total Events</div>
      </div>` +
      Object.entries(stats.byLevel).map(([level, count]) =>
        `<div class="stat-card">
          <div class="stat-value">${count}</div>
          <div class="stat-label">${level}</div>
        </div>`
      ).join("") +
      Object.entries(stats.byType).map(([type, count]) =>
        `<div class="stat-card">
          <div class="stat-value">${count}</div>
          <div class="stat-label">${type}</div>
        </div>`
      ).join("");

    const events = await fetch("/events").then(r=>r.json());
    document.getElementById("events").innerHTML =
      events.slice(-20).reverse().map(e =>
        `<div class="card ${e.level || 'LOW'}">
          <span class="event-type">${e.type}</span> - <b>${e.level || 'LOW'}</b><br/>
          ${e.risk !== undefined ? `Risk: ${e.risk}<br/>` : ''}
          ${e.author ? `Author: ${e.author}<br/>` : ''}
          <span class="timestamp">${e.time}</span>
        </div>`
      ).join("");
  } catch (e) {
    console.error("Failed to load:", e);
  }
}

setInterval(load, 2000);
load();
</script>
</body>
</html>
