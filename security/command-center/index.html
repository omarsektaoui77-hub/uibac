<!DOCTYPE html>
<html>
<head>
  <title>Security Command Center (Enterprise)</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0b0f14; 
      color: #e6edf3; 
      margin: 0;
      padding: 20px;
    }
    h2 { margin-top: 0; }
    .card { 
      padding: 12px; 
      margin: 10px 0; 
      border-radius: 8px; 
      background: #161b22; 
      border-left: 4px solid #333;
    }
    .HIGH { border-left-color: #e74c3c; }
    .CRITICAL { border-left-color: #e67e22; }
    .MEDIUM { border-left-color: #f39c12; }
    .LOW { border-left-color: #27ae60; }
    .stats { 
      display: flex; 
      gap: 20px; 
      margin-bottom: 20px; 
      flex-wrap: wrap;
    }
    .stat-card {
      flex: 1;
      min-width: 120px;
      padding: 15px;
      background: #161b22;
      border-radius: 8px;
      text-align: center;
    }
    .stat-value { 
      font-size: 24px; 
      font-weight: bold; 
    }
    .stat-label { 
      color: #8b949e; 
      font-size: 12px; 
    }
    .timestamp {
      color: #8b949e;
      font-size: 12px;
    }
    .event-type {
      color: #58a6ff;
      font-weight: bold;
    }
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-input {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 8px;
      border-radius: 4px;
    }
    .filter-select {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 8px;
      border-radius: 4px;
    }
    .auth-input {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 20px;
      width: 300px;
    }
    .auth-button {
      background: #238636;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    .auth-button:hover {
      background: #2ea043;
    }
    .error {
      color: #e74c3c;
      margin-bottom: 10px;
    }
    .mode-badge {
      background: #a855f7;
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <h2>🛡️ Security Command Center <span class="mode-badge">Enterprise</span></h2>
  
  <div id="auth-section">
    <input type="password" id="token" class="auth-input" placeholder="Enter auth token (optional in dev)">
    <select id="role" class="filter-select">
      <option value="viewer">Viewer</option>
      <option value="developer">Developer</option>
      <option value="security">Security</option>
      <option value="admin">Admin</option>
    </select>
    <button class="auth-button" onclick="setCredentials()">Set Credentials</button>
  </div>
  
  <div class="filters">
    <input type="text" id="filter-org" class="filter-input" placeholder="Organization" onchange="load()">
    <input type="text" id="filter-repo" class="filter-input" placeholder="Repository" onchange="load()">
    <select id="filter-env" class="filter-select" onchange="load()">
      <option value="">All Environments</option>
      <option value="development">Development</option>
      <option value="staging">Staging</option>
      <option value="production">Production</option>
    </select>
    <select id="filter-level" class="filter-select" onchange="load()">
      <option value="">All Levels</option>
      <option value="LOW">Low</option>
      <option value="MEDIUM">Medium</option>
      <option value="HIGH">High</option>
      <option value="CRITICAL">Critical</option>
    </select>
  </div>
  
  <div class="stats" id="stats"></div>
  <div id="events"></div>
  <div id="error" class="error"></div>

<script>
let authToken = localStorage.getItem("cc-token") || "";
let userRole = localStorage.getItem("cc-role") || "viewer";

function setCredentials() {
  authToken = document.getElementById("token").value;
  userRole = document.getElementById("role").value;
  localStorage.setItem("cc-token", authToken);
  localStorage.setItem("cc-role", userRole);
  load();
}

async function fetchWithAuth(url) {
  const headers = {};
  if (authToken) {
    headers["x-cc-token"] = authToken;
  }
  if (userRole) {
    headers["x-role"] = userRole;
  }
  const response = await fetch(url, { headers });
  if (response.status === 403) {
    document.getElementById("error").textContent = "Forbidden - insufficient permissions or invalid token";
    throw new Error("Forbidden");
  }
  document.getElementById("error").textContent = "";
  return response;
}

async function load() {
  try {
    const org = document.getElementById("filter-org").value;
    const statsUrl = org ? `/stats?org=${org}` : "/stats";
    const stats = await fetchWithAuth(statsUrl).then(r=>r.json());
    
    document.getElementById("stats").innerHTML =
      `<div class="stat-card">
        <div class="stat-value">${stats.total}</div>
        <div class="stat-label">Total Events</div>
      </div>` +
      Object.entries(stats.byLevel || {}).map(([level, count]) =>
        `<div class="stat-card">
          <div class="stat-value">${count}</div>
          <div class="stat-label">${level}</div>
        </div>`
      ).join("") +
      Object.entries(stats.byType || {}).map(([type, count]) =>
        `<div class="stat-card">
          <div class="stat-value">${count}</div>
          <div class="stat-label">${type}</div>
        </div>`
      ).join("");

    const repo = document.getElementById("filter-repo").value;
    const env = document.getElementById("filter-env").value;
    const level = document.getElementById("filter-level").value;
    
    const params = new URLSearchParams();
    if (repo) params.append("repo", repo);
    if (env) params.append("env", env);
    if (level) params.append("level", level);
    if (org) params.append("org", org);
    
    const eventsUrl = `/events?${params}`;
    const events = await fetchWithAuth(eventsUrl).then(r=>r.json());
    
    document.getElementById("events").innerHTML =
      events.slice(-20).reverse().map(e =>
        `<div class="card ${e.level || 'LOW'}">
          <span class="event-type">${e.type}</span> - <b>${e.level || 'LOW'}</b><br/>
          ${e.org ? `Org: ${e.org}<br/>` : ''}
          ${e.repo ? `Repo: ${e.repo}<br/>` : ''}
          ${e.env ? `Env: ${e.env}<br/>` : ''}
          ${e.service ? `Service: ${e.service}<br/>` : ''}
          ${e.risk !== undefined ? `Risk: ${e.risk}<br/>` : ''}
          ${e.author || e.actor ? `Actor: ${e.author || e.actor}<br/>` : ''}
          <span class="timestamp">${e.time}</span>
        </div>`
      ).join("");
  } catch (e) {
    console.error("Failed to load:", e);
  }
}

// Initialize UI
document.getElementById("token").value = authToken;
document.getElementById("role").value = userRole;

setInterval(load, 2000);
load();
</script>
</body>
</html>
