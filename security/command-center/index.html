<!DOCTYPE html>
<html>
<head>
  <title>Security Command Center</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0b0f14; 
      color: #e6edf3; 
      margin: 0;
      padding: 20px;
    }
    h2 { margin-top: 0; }
    .card { 
      padding: 12px; 
      margin: 10px 0; 
      border-radius: 8px; 
      background: #161b22; 
      border-left: 4px solid #333;
    }
    .HIGH { border-left-color: #e74c3c; }
    .CRITICAL { border-left-color: #e67e22; }
    .MEDIUM { border-left-color: #f39c12; }
    .LOW { border-left-color: #27ae60; }
    .stats { 
      display: flex; 
      gap: 20px; 
      margin-bottom: 20px; 
    }
    .stat-card {
      flex: 1;
      padding: 15px;
      background: #161b22;
      border-radius: 8px;
      text-align: center;
    }
    .stat-value { 
      font-size: 24px; 
      font-weight: bold; 
    }
    .stat-label { 
      color: #8b949e; 
      font-size: 12px; 
    }
    .timestamp {
      color: #8b949e;
      font-size: 12px;
    }
    .event-type {
      color: #58a6ff;
      font-weight: bold;
    }
    .auth-input {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 20px;
      width: 300px;
    }
    .auth-button {
      background: #238636;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    .auth-button:hover {
      background: #2ea043;
    }
    .error {
      color: #e74c3c;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h2>🛡️ Security Command Center</h2>
  
  <div id="auth-section">
    <input type="password" id="token" class="auth-input" placeholder="Enter auth token (optional in dev)">
    <button class="auth-button" onclick="setToken()">Set Token</button>
  </div>
  
  <div class="stats" id="stats"></div>
  <div id="events"></div>
  <div id="error" class="error"></div>

<script>
let authToken = localStorage.getItem("cc-token") || "";

function setToken() {
  authToken = document.getElementById("token").value;
  localStorage.setItem("cc-token", authToken);
  load();
}

async function fetchWithAuth(url) {
  const headers = {};
  if (authToken) {
    headers["x-cc-token"] = authToken;
  }
  const response = await fetch(url, { headers });
  if (response.status === 403) {
    document.getElementById("error").textContent = "Unauthorized - check your token";
    throw new Error("Unauthorized");
  }
  document.getElementById("error").textContent = "";
  return response;
}

async function load() {
  try {
    const stats = await fetchWithAuth("/stats").then(r=>r.json());
    document.getElementById("stats").innerHTML =
      `<div class="stat-card">
        <div class="stat-value">${stats.total}</div>
        <div class="stat-label">Total Events</div>
      </div>` +
      Object.entries(stats.byLevel).map(([level, count]) =>
        `<div class="stat-card">
          <div class="stat-value">${count}</div>
          <div class="stat-label">${level}</div>
        </div>`
      ).join("") +
      Object.entries(stats.byType).map(([type, count]) =>
        `<div class="stat-card">
          <div class="stat-value">${count}</div>
          <div class="stat-label">${type}</div>
        </div>`
      ).join("");

    const events = await fetchWithAuth("/events").then(r=>r.json());
    document.getElementById("events").innerHTML =
      events.slice(-20).reverse().map(e =>
        `<div class="card ${e.level || 'LOW'}">
          <span class="event-type">${e.type}</span> - <b>${e.level || 'LOW'}</b><br/>
          ${e.risk !== undefined ? `Risk: ${e.risk}<br/>` : ''}
          ${e.author ? `Author: ${e.author}<br/>` : ''}
          <span class="timestamp">${e.time}</span>
        </div>`
      ).join("");
  } catch (e) {
    console.error("Failed to load:", e);
  }
}

setInterval(load, 2000);
load();
</script>
</body>
</html>
